name: Update the latest branch
on:
  push:
    branches:
      - main
jobs:
  build:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - run: npm ci
      - run: npm run build
      - uses: suzuki-shunsuke/release-js-action@70e628b312540c8e706e31708977542719cf8302 # v0.2.0
        with:
          version: latest
